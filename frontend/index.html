<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FeedbackHub</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav>
        <h1>FeedbackHub</h1>
    </nav>
</header>


<section class="hero">

    <h2>Share Your Feedback</h2>

    <p>
        Help us improve our products and services by sharing your experience.
    </p>

</section>



<section class="features">

    <h2>Why FeedbackHub?</h2>

    <div class="feature-container">

        <div class="card">
            <h3>Simple</h3>
            <p>
                Easy feedback submission experience.
            </p>
        </div>


        <div class="card">
            <h3>Secure</h3>
            <p>
                Built using AWS cloud services.
            </p>
        </div>


        <div class="card">
            <h3>Scalable</h3>
            <p>
                Designed using serverless architecture.
            </p>
        </div>

    </div>

</section>



<section class="feedback">

<h2>Submit Feedback</h2>


<form id="feedbackForm">


<label>
Name
</label>

<input 
type="text"
id="name"
placeholder="Enter your name"
>



<label>
Email
</label>

<input 
type="email"
id="email"
placeholder="Enter your email"
>


<label>
Rating
</label>


<select id="rating">

<option value="">Select Rating</option>

<option value="5">⭐⭐⭐⭐⭐</option>

<option value="4">⭐⭐⭐⭐</option>

<option value="3">⭐⭐⭐</option>

<option value="2">⭐⭐</option>

<option value="1">⭐</option>


</select>


<label>
Message
</label>


<textarea
id="message"
placeholder="Write your feedback">
</textarea>


<button type="submit">
Submit Feedback
</button>


</form>


<p id="response"></p>


</section>



<footer>

<p>
© 2026 FeedbackHub
</p>

</footer>


<script src="app.js"></script>

</body>

</html>
